<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VALORANT Stats | Ngo Bao Minh</title>
  <link rel="stylesheet" href="../../styles.css">
  <script defer src="../../script.js"></script>
</head>
<body data-route="valorant-stats">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="../home/index.html">
        <img class="brand-icon" src="../../assets/site-icon.png" alt="">
        <span>
          <span class="brand-name">Ngo Bao Minh</span>
        </span>
      </a>

      <nav class="nav" aria-label="Main navigation">
        <a class="nav-link" data-route="home" href="../home/index.html">Home</a>
        <a class="nav-link" data-route="devices" href="../devices/index.html">Devices</a>
        <a class="nav-link" data-route="socials" href="../socials/index.html">Socials</a>
        <a class="nav-link" data-route="projects" href="../projects/index.html">Projects</a>
        <a class="nav-link" data-route="valorant-stats" href="../valorant-stats/index.html">VALORANT Stats</a>
      </nav>

      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.99 13.31A8.5 8.5 0 0 1 10.69 3.01 8.5 8.5 0 1 0 20.99 13.31Z"></path>
        </svg>
      </button>

      <button class="menu-toggle" type="button" data-menu-toggle aria-label="Open menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 17h16"></path>
        </svg>
      </button>
    </header>

    <main class="page valorant-page">
      <section class="page-title valorant-title" aria-labelledby="valorant-title">
        <h1 id="valorant-title">VALORANT Stats</h1>
      </section>

      <section class="valorant-profile" aria-label="VALORANT profile">
        <p class="eyebrow valorant-profile-label">Profile</p>
        <div class="valorant-profile-top">
          <div class="valorant-avatar">
            <img data-valorant-card src="" alt="Nanashi Mumei player card" hidden>
          </div>

          <div class="valorant-identity">
            <h2>Nanashi Mumei<span>#baooo</span></h2>
            <p>Level <strong data-valorant-level>--</strong></p>
          </div>

          <figure class="valorant-peak">
            <img data-peak-rank-icon src="" alt="" hidden>
            <figcaption>Peak Rank</figcaption>
            <strong data-valorant-peak-rank>--</strong>
          </figure>
        </div>

        <div class="valorant-current">
          <img data-current-rank-icon src="" alt="" hidden>
          <div class="valorant-current-info">
            <strong data-valorant-current-rank>--</strong>
            <div class="valorant-rr-container">
              <span data-valorant-rr>-- RR</span>
              <div class="valorant-rr-track">
                <div class="valorant-rr-fill" data-valorant-rr-fill></div>
              </div>
            </div>
          </div>
        </div>

        <p class="valorant-status" data-valorant-status>Loading live stats...</p>
      </section>

      <section class="section" aria-label="Match history">
        <div class="section-header">
          <p class="eyebrow">Matches</p>
        </div>

        <div class="match-list" data-match-list>
          <article class="match-row match-row-loading">
            <span>Loading matches...</span>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>&copy; 2026 Ngo Bao Minh. All rights reserved.</span>
      <span class="api-credit">
        APIs used: <a href="https://docs.henrikdev.xyz/" target="_blank" rel="noreferrer">HenrikDev</a> and <a href="https://valorant-api.com/" target="_blank" rel="noreferrer">Valorant-API</a>
      </span>
    </footer>
  </div>
</body>
</html>
